<!DOCTYPE html>
<html>
<head>
<title>Fullstack App</title>
</head>

<body>

<h1>Frontend Container 🚀</h1>

<button onclick="callAPI()">Call Backend</button>

<p id="result"></p>

<script>
function callAPI(){
fetch("http://backend:5000/api")
.then(res=>res.text())
.then(data=>{
document.getElementById("result").innerHTML=data;
});
}
</script>

</body>
</html>
